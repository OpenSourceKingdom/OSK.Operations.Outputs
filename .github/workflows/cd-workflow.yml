name: .NET Test Automation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:

  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET Core SDK ${{ matrix.dotnet-version }}
      uses: actions/setup-dotnet@v5.0.1
      with:
        dotnet-version: 10.x
    - name: Restore dependencies
      run: >-
        dotnet restore ./src/${{ github.event.repository.name }}.slnx
    - name: Build
      run: dotnet build --no-restore ./src/${{ github.event.repository.name }}.slnx
    - name: Test
      run: dotnet test --no-build --verbosity normal ./src/${{ github.event.repository.name }}.slnx
